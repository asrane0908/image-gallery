<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>
<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
    <img src="https://picsum.photos/id/1015/300" class="nature" onclick="openLightbox(this)">    
    <img src="https://picsum.photos/id/1011/300" class="nature" onclick="openLightbox(this)">
    <img src="https://picsum.photos/id/1012/300" class="city" onclick="openLightbox(this)">
    <img src="https://picsum.photos/id/1016/300" class="city" onclick="openLightbox(this)">
</div>

<!-- Lightbox -->
<div id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
    <div class="nav">
        <button onclick="prevImage()">Prev</button>
        <button onclick="nextImage()">Next</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
